name: CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pokedex-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pokedex-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build