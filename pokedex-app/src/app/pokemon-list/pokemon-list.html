<div class="container pokedex-page mt-4">

  <div class="page-header">
    <div class="title-wrap">
      <span class="title-chip">Coleção</span>
      <h1>Pokédex</h1>
      <p>{{ pokemons.length }} Pokémon na tua coleção</p>
    </div>
  </div>

  <div class="add-form card-shell mb-4">
    <div class="row g-3 w-100 align-items-end">
      <div class="col-12 col-md-4">
        <label class="field-label">Nome</label>
        <input
          type="text"
          class="form-control"
          placeholder="Nome do Pokémon"
          [(ngModel)]="newPokemonName"
        >
      </div>

      <div class="col-12 col-md-3">
        <label class="field-label">Tipo</label>
        <input
          type="text"
          class="form-control"
          placeholder="Ex: Fire, Water..."
          [(ngModel)]="newPokemonType"
        >
      </div>

      <div class="col-12 col-md-2">
        <label class="field-label">Nível</label>
        <input
          type="number"
          class="form-control"
          placeholder="Nível"
          [(ngModel)]="newPokemonLevel"
          min="1"
          max="100"
        >
      </div>

      <div class="col-12 col-md-2">
        <button class="btn btn-primary w-100" (click)="addPokemon()">
          + Adicionar
        </button>
      </div>

      <div class="col-12 col-md-1">
        <button class="btn btn-secondary w-100" (click)="resetPokemons()">
          Reset
        </button>
      </div>
    </div>
  </div>

  @if (pokemons.length === 0) {
    <div class="empty-state card-shell">
      <span>⚪</span>
      <strong>Sem Pokémon disponíveis.</strong>
      <p>Adiciona um novo Pokémon para começar a tua coleção.</p>
    </div>
  }

  <div class="grid">
    @for (pokemon of pokemons; track pokemon.name) {
      <article class="pokemon-card type-{{ pokemon.type | lowercase }}">
        <div class="card-top-line"></div>

        <div class="pokemon-image-wrap">
          <img
            [src]="'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + getPokemonId(pokemon.name) + '.png'"
            [alt]="pokemon.name"
            class="pokemon-img"
            onerror="this.style.display='none'"
          >
        </div>

        <h3>{{ pokemon.name }}</h3>

        <div class="type-badge">{{ pokemon.type }}</div>

        <div class="level-wrapper">
          <div class="level-header">
            <span class="level-label">Nível</span>
            <span class="level-number">{{ pokemon.level }}/100</span>
          </div>

          <div class="level-bar-bg">
            <div
              class="level-bar-fill"
              [style.width.%]="pokemon.level"
            ></div>
          </div>
        </div>

        <button
          class="btn btn-sm btn-danger"
          (click)="removePokemon(pokemon.name)"
        >
          Remover
        </button>
      </article>
    }
  </div>

  <div class="pokeball-bg"></div>
</div>
